<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crop Recommendation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        /* Background Image */
        body {
            background: url('https://source.unsplash.com/1600x900/?farm,agriculture') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
        }

        /* Overlay */
        .overlay {
            background: rgba(0, 0, 0, 0.6);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.8) !important;
        }

        /* Main Container */
        .container {
            max-width: 800px;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            margin-top: 50px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1s ease-in-out;
        }

        /* Fade In Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Form Styling */
        .form-control {
            border-radius: 10px;
            transition: 0.3s ease-in-out;
        }
        .form-control:focus {
            border-color: #28a745;
            box-shadow: 0px 0px 8px rgba(40, 167, 69, 0.5);
        }

        /* Button */
        .btn-custom {
            background: #28a745;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-custom:hover {
            background: #218838;
        }

        /* Result Card */
        .card-result {
            background: #2d2d2d;
            color: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand mx-auto" href="/">🌾 Crop Recommendation System</a>
        </div>
    </nav>

    <!-- Main Form -->
    <div class="container">
        <h2 class="text-center text-success mb-4">🌱 Get the Best Crop Recommendation 🌱</h2>
        <form action="/predict" method="POST">
            <div class="row g-3">
                <div class="col-md-4">
                    <label for="Nitrogen">Nitrogen</label>
                    <input type="number" id="Nitrogen" name="Nitrogen" class="form-control" placeholder="Enter Nitrogen" required>
                </div>
                <div class="col-md-4">
                    <label for="Phosporus">Phosphorus</label>
                    <input type="number" id="Phosporus" name="Phosporus" class="form-control" placeholder="Enter Phosphorus" required>
                </div>
                <div class="col-md-4">
                    <label for="Potassium">Potassium</label>
                    <input type="number" id="Potassium" name="Potassium" class="form-control" placeholder="Enter Potassium" required>
                </div>
            </div>

            <div class="row g-3 mt-3">
                <div class="col-md-4">
                    <label for="Temperature">Temperature (°C)</label>
                    <input type="number" id="Temperature" name="Temperature" class="form-control" step="0.1" placeholder="Enter Temperature" required>
                </div>
                <div class="col-md-4">
                    <label for="Humidity">Humidity (%)</label>
                    <input type="number" id="Humidity" name="Humidity" class="form-control" step="0.1" placeholder="Enter Humidity" required>
                </div>
                <div class="col-md-4">
                    <label for="pH">pH Level</label>
                    <input type="number" id="pH" name="pH" class="form-control" step="0.01" placeholder="Enter pH Value" required>
                </div>
            </div>

            <div class="row g-3 mt-3">
                <div class="col-md-4">
                    <label for="Rainfall">Rainfall (mm)</label>
                    <input type="number" id="Rainfall" name="Rainfall" class="form-control" step="0.1" placeholder="Enter Rainfall" required>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="text-center mt-4">
                <button type="submit" class="btn btn-custom btn-lg">Get Recommendation</button>
            </div>
        </form>

        <!-- Result Card -->
        {% if result %}
        <div class="card card-result mt-4 mx-auto" style="max-width: 400px;">
            <img src="{{ url_for('static', filename='crop.png') }}" class="img-fluid" style="max-width: 80px; margin-bottom: 10px;">
            <h5 class="mt-2">Recommended Crop:</h5>
            <p class="fs-4">{{ result }}</p>
        </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
